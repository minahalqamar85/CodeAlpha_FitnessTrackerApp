<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pulse — Fitness Tracker</title>
<style>
  :root {
    --bg: #0f1410;
    --panel: #161d17;
    --line: #263028;
    --text: #eef2ea;
    --muted: #8fa091;
    --accent: #9fe870;
    --accent-dim: #4f6d40;
    --steps: #9fe870;
    --workout: #70c4e8;
    --calories: #e89f70;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 32px 16px 80px;
  }

  .wrap { max-width: 760px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
  }

  header h1 {
    font-size: 22px;
    margin: 0;
    letter-spacing: -0.01em;
  }

  header .date {
    font-size: 13px;
    color: var(--muted);
  }

  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 16px;
  }

  .stat .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .stat .value {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .bar-track {
    height: 6px;
    border-radius: 3px;
    background: #222b23;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .stat.steps .bar-fill { background: var(--steps); }
  .stat.workout .bar-fill { background: var(--workout); }
  .stat.calories .bar-fill { background: var(--calories); }

  .stat .goal {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 22px;
    margin-bottom: 20px;
  }

  .panel h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 16px;
  }

  form {
    display: grid;
    grid-template-columns: 1.3fr 1fr 1fr auto;
    gap: 10px;
  }

  select, input {
    background: #10160f;
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    width: 100%;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--accent-dim);
  }

  button[type="submit"] {
    background: var(--accent);
    color: #0f1410;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  button[type="submit"]:hover { filter: brightness(1.05); }
  button[type="submit"]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .log-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .log-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }

  .log-item:last-child { border-bottom: none; }

  .log-item .meta { color: var(--muted); font-size: 12px; }

  .log-item .remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 4px 8px;
  }

  .log-item .remove:hover { color: #e87070; }

  .empty {
    color: var(--muted);
    font-size: 13px;
    padding: 8px 0;
  }

  .week {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    align-items: end;
    height: 90px;
  }

  .week .day {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
  }

  .week .col {
    width: 100%;
    background: var(--accent-dim);
    border-radius: 4px 4px 0 0;
    min-height: 4px;
  }

  .week .day-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
  }

  @media (max-width: 560px) {
    form { grid-template-columns: 1fr 1fr; }
    form button { grid-column: span 2; }
    .summary { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>Pulse</h1>
    <span class="date" id="today-label"></span>
  </header>

  <section class="summary">
    <div class="stat steps">
      <div class="label">Steps today</div>
      <div class="value" id="steps-value">0</div>
      <div class="bar-track"><div class="bar-fill" id="steps-bar" style="width:0%"></div></div>
      <div class="goal">Goal: 8,000</div>
    </div>
    <div class="stat workout">
      <div class="label">Workout minutes</div>
      <div class="value" id="workout-value">0</div>
      <div class="bar-track"><div class="bar-fill" id="workout-bar" style="width:0%"></div></div>
      <div class="goal">Goal: 45 min</div>
    </div>
    <div class="stat calories">
      <div class="label">Calories burned</div>
      <div class="value" id="calories-value">0</div>
      <div class="bar-track"><div class="bar-fill" id="calories-bar" style="width:0%"></div></div>
      <div class="goal">Goal: 500</div>
    </div>
  </section>

  <section class="panel">
    <h2>Log activity</h2>
    <form id="log-form">
      <select id="activity-type" required>
        <option value="Walking">Walking</option>
        <option value="Running">Running</option>
        <option value="Cycling">Cycling</option>
        <option value="Strength">Strength training</option>
        <option value="Yoga">Yoga</option>
        <option value="Other">Other</option>
      </select>
      <input type="number" id="activity-minutes" placeholder="Minutes" min="1" required />
      <input type="number" id="activity-calories" placeholder="Calories" min="0" required />
      <button type="submit">Add</button>
    </form>
  </section>

  <section class="panel">
    <h2>This week</h2>
    <div class="week" id="week-chart"></div>
  </section>

  <section class="panel">
    <h2>Today's log</h2>
    <ul class="log-list" id="log-list"></ul>
  </section>
</div>

<script>
  const STORAGE_KEY = 'pulse_fitness_data_v1';
  const GOALS = { steps: 8000, workout: 45, calories: 500 };

  function todayKey(date = new Date()) {
    return date.toISOString().slice(0, 10);
  }

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch {
      return {};
    }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  let data = loadData();
  const today = todayKey();
  if (!data[today]) data[today] = { steps: 0, entries: [] };

  const todayLabelEl = document.getElementById('today-label');
  todayLabelEl.textContent = new Date().toLocaleDateString(undefined, {
    weekday: 'long', month: 'short', day: 'numeric'
  });

  function computeTodayTotals() {
    const entries = data[today].entries;
    const workout = entries.reduce((sum, e) => sum + e.minutes, 0);
    const calories = entries.reduce((sum, e) => sum + e.calories, 0);
    const steps = data[today].steps || Math.round(workout * 120); // approx steps from activity
    return { steps, workout, calories };
  }

  function renderSummary() {
    const { steps, workout, calories } = computeTodayTotals();

    document.getElementById('steps-value').textContent = steps.toLocaleString();
    document.getElementById('workout-value').textContent = workout;
    document.getElementById('calories-value').textContent = calories;

    document.getElementById('steps-bar').style.width = Math.min(100, (steps / GOALS.steps) * 100) + '%';
    document.getElementById('workout-bar').style.width = Math.min(100, (workout / GOALS.workout) * 100) + '%';
    document.getElementById('calories-bar').style.width = Math.min(100, (calories / GOALS.calories) * 100) + '%';
  }

  function renderLog() {
    const listEl = document.getElementById('log-list');
    const entries = data[today].entries;
    listEl.innerHTML = '';

    if (entries.length === 0) {
      listEl.innerHTML = '<li class="empty">No activity logged yet today. Add your first entry above.</li>';
      return;
    }

    entries.slice().reverse().forEach((entry) => {
      const li = document.createElement('li');
      li.className = 'log-item';
      li.innerHTML = `
        <span>${entry.type} — ${entry.minutes} min</span>
        <span class="meta">${entry.calories} cal</span>
      `;
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove';
      removeBtn.textContent = 'Remove';
      removeBtn.addEventListener('click', () => {
        const realIndex = entries.indexOf(entry);
        entries.splice(realIndex, 1);
        saveData(data);
        renderAll();
      });
      li.appendChild(removeBtn);
      listEl.appendChild(li);
    });
  }

  function renderWeek() {
    const chart = document.getElementById('week-chart');
    chart.innerHTML = '';
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      days.push(d);
    }

    const maxCalories = Math.max(
      GOALS.calories,
      ...days.map(d => {
        const key = todayKey(d);
        const dayData = data[key];
        if (!dayData) return 0;
        return dayData.entries.reduce((s, e) => s + e.calories, 0);
      })
    );

    days.forEach((d) => {
      const key = todayKey(d);
      const dayData = data[key];
      const calories = dayData ? dayData.entries.reduce((s, e) => s + e.calories, 0) : 0;
      const heightPct = Math.max(4, (calories / maxCalories) * 100);

      const dayEl = document.createElement('div');
      dayEl.className = 'day';
      dayEl.innerHTML = `
        <div class="col" style="height:${heightPct}%"></div>
        <div class="day-label">${d.toLocaleDateString(undefined, { weekday: 'short' })[0]}</div>
      `;
      chart.appendChild(dayEl);
    });
  }

  function renderAll() {
    renderSummary();
    renderLog();
    renderWeek();
  }

  document.getElementById('log-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const type = document.getElementById('activity-type').value;
    const minutes = parseInt(document.getElementById('activity-minutes').value, 10);
    const calories = parseInt(document.getElementById('activity-calories').value, 10);

    if (!minutes || minutes <= 0) return;

    data[today].entries.push({ type, minutes, calories: calories || 0 });
    saveData(data);
    e.target.reset();
    renderAll();
  });

  renderAll();
</script>

</body>
</html>
